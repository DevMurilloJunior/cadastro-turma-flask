<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main>
         <h1>Cadastro da Turma</h1>

        <p>Preencha os dados abaixo para cadastrar um aluno.</p>

        <input type="text" id="nome" placeholder="Digite o nome do aluno">

        <input type="number" id="idade" placeholder="Digite a idade">

        <input type="text" id="curso" placeholder="Digite o curso">

        <button onclick="cadastrarAluno()">Cadastrar</button>

        <button onclick="limparLista()">Limpar Lista</button>

        <h2>Total de alunos: <span id="totalAlunos">0</span></h2>

        <div id="listaAlunos"></div>

        <h3 id="mensagem"></h3>
    </main>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
